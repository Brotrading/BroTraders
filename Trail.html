<style>
  /* ================= HEADER ================= */
  .bt-header {
    position: fixed;
    top: 40px;
    left: 0;
    margin: 10px 15px;
    margin-left: 180px;
    border-radius: 15px;
    width: 80%;
    background: #00000073;
    z-index: 1000;
    transition: all 0.35s ease;
  }

  .bt-header.bt-scrolled {
    top: 0;
    background: rgba(10, 15, 30, 0.75);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(0, 194, 255, 0.25);
    width: 63%;
    margin-left: 276px;
  }

  .bt-container {
    max-width: 1400px;
    margin: auto;
    padding: 0px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: padding 0.3s ease;
  }

  .bt-header.bt-scrolled .bt-container {
    padding: 0px 30px;
  }

  .bt-logo img {
    height: 55px;
    transition: height 0.3s ease;
    display: block;
  }

  .bt-header.bt-scrolled .bt-logo img {
    height: 50px;
  }

  /* ================= NAV ================= */
  .bt-nav {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .bt-link,
  .bt-drop-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
    font-weight: 500;
    font-family: inherit;
  }

  .bt-link:hover,
  .bt-drop-btn:hover {
    color: #00c2ff;
  }

  /* ================= DROPDOWN ================= */
  .bt-dropdown {
    position: relative;
  }

  .bt-drop-menu {
    position: absolute;
    top: 170%;
    left: 0;
    min-width: 650px;
    padding: 30px;
    border-radius: 14px;
    background: rgba(15, 20, 45, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 194, 255, 0.6);
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.35s ease;
    z-index: 1001;
  }

  .bt-drop-menu.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .bt-drop-menu.small {
    min-width: 260px;
    padding: 20px;
  }

  .bt-drop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  .bt-drop-menu a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin-bottom: 12px;
    transition: 0.3s;
    font-size: 15px;
  }

  .bt-drop-menu a:hover {
    color: #00c2ff;
    padding-left: 5px;
  }
  .bt-drop-menu strong:hover {
    color: #f1f3f4;
    padding-left: 0px !important;
    transition: 0s;
  }

  /* DESKTOP HOVER OPEN */
  @media (min-width: 1025px) {
    .bt-dropdown:hover .bt-drop-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  }

  /* ================= CTA ================= */
  .bt-cta {
    background: linear-gradient(135deg, #00c2ff, #1e90ff);
    padding: 9px 22px;
    border-radius: 30px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: 0.3s ease;
    white-space: nowrap;
  }

  .bt-cta:hover {
    transform: translateY(-3px);
    background: white;
    color: #0b0f2a;
  }

  /* ================= HAMBURGER ================= */
  .bt-hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    z-index: 1003;
    transition: all 0.3s ease;
  }

  .bt-hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  .bt-hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
  }

  .bt-hamburger.active span:nth-child(2) {
    opacity: 0;
    transform: scale(0);
  }

  .bt-hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
  }

  .bt-hamburger:hover span {
    background: #00c2ff;
  }

  /* ================= MOBILE MENU ================= */
  .bt-mobile-close {
    display: none;
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    font-size: 32px;
    color: #fff;
    cursor: pointer;
    font-weight: 300;
    transition: 0.2s;
    z-index: 1004;
    background: transparent;
    border: none;
    align-items: center;
    justify-content: center;
  }

  .bt-mobile-close:hover {
    color: #00c2ff;
    transform: rotate(90deg);
  }

  .bt-overlay {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(2px);
    background: rgba(0, 0, 0, 0.5);
    display: none;
    z-index: 900;
    transition: 0.3s;
  }

  .bt-overlay.active {
    display: block;
  }

  @media (max-width: 1024px) {
    .bt-hamburger {
      display: flex;
    }

    .bt-cta {
      display: none;
    }

    .bt-nav {
      position: fixed;
      top: 0;
      right: -100%;
      width: 320px;
      max-width: 85%;
      height: 100vh;
      background: linear-gradient(135deg, #0a0e25 0%, #080c20 100%);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 80px 25px 30px;
      gap: 15px;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1002;
      overflow-y: auto;
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.6);
      border-left: 1px solid rgba(0, 194, 255, 0.3);
    }

    .bt-nav.active {
      right: 0;
    }

    .bt-mobile-close {
      display: flex;
    }

    .bt-dropdown {
      width: 100%;
    }

    .bt-drop-btn {
      width: 100%;
      text-align: left;
      font-size: 18px;
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bt-drop-btn::after {
      content: "▾";
      font-size: 16px;
      transition: transform 0.3s;
    }

    .bt-dropdown .bt-drop-btn[aria-expanded="true"]::after {
      transform: rotate(180deg);
    }

    .bt-drop-menu {
      position: static;
      min-width: 100%;
      padding: 0;
      margin-top: 10px;
      margin-bottom: 5px;
      background: rgba(15, 20, 45, 0.8);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(0, 194, 255, 0.3);
      border-radius: 12px;
      opacity: 0;
      visibility: hidden;
      transform: none;
      transition:
        opacity 0.25s ease,
        visibility 0.25s ease;
      display: block;
      max-height: 0;
      overflow: hidden;
      padding: 0 15px;
    }

    .bt-drop-menu.active {
      opacity: 1;
      visibility: visible;
      max-height: 500px;
      padding: 15px;
      margin-bottom: 10px;
    }

    .bt-drop-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .bt-drop-menu a {
      font-size: 13px;
      padding: 5px 0;
      margin-bottom: 0;
    }

    .bt-link {
      font-size: 18px;
      padding: 10px 0;
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    .bt-drop-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .bt-nav {
      width: 280px;
    }
  }

  /* Header responsive fixes */
  @media (max-width: 1300px) {
    .bt-header {
      width: calc(100% - 40px);
      margin-left: 20px;
      margin-right: 20px;
    }
    .bt-header.bt-scrolled {
      width: calc(100% - 40px);
      margin-left: 20px;
    }
  }

  @media (max-width: 1024px) {
    .bt-header,
    .bt-header.bt-scrolled {
      width: calc(100% - 30px);
      margin-left: 15px;
      margin-right: 15px;
      top: 15px;
    }
    .bt-header.bt-scrolled {
      top: 0;
    }
  }

  @media (max-width: 768px) {
    .bt-container {
      padding: 0px 20px;
    }
    .bt-logo img {
      height: 48px;
    }
  }
</style>

<script>
  // Get elements
  const hamburger = document.getElementById("hamburgerBtn");
  const mobileMenu = document.querySelector(".bt-nav");
  const overlay = document.getElementById("overlay");
  const closeBtn = document.querySelector(".bt-mobile-close");

  // Toggle mobile menu functions
  function openMobileMenu() {
    mobileMenu.classList.add("active");
    overlay.classList.add("active");
    hamburger.classList.add("active");
    document.body.style.overflow = "hidden";
  }

  function closeMobileMenu() {
    mobileMenu.classList.remove("active");
    overlay.classList.remove("active");
    hamburger.classList.remove("active");
    document.body.style.overflow = "";

    // Close all open dropdowns
    document.querySelectorAll(".bt-drop-menu").forEach((menu) => {
      menu.classList.remove("active");
    });

    // Reset dropdown button ARIA
    document.querySelectorAll(".bt-drop-btn").forEach((btn) => {
      btn.setAttribute("aria-expanded", "false");
    });
  }

  // Toggle function
  function toggleMobileMenu() {
    if (mobileMenu.classList.contains("active")) {
      closeMobileMenu();
    } else {
      openMobileMenu();
    }
  }

  // Hamburger click event
  if (hamburger) {
    hamburger.addEventListener("click", function (e) {
      e.stopPropagation();
      toggleMobileMenu();
    });
  }

  // Close button click
  if (closeBtn) {
    closeBtn.addEventListener("click", function () {
      closeMobileMenu();
    });
  }

  // Overlay click to close
  if (overlay) {
    overlay.addEventListener("click", function () {
      closeMobileMenu();
    });
  }

  // Dropdown toggle for mobile
  const dropBtns = document.querySelectorAll(".bt-drop-btn");
  dropBtns.forEach((btn) => {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      const dropdownId = this.getAttribute("data-dropdown");
      const menu = document.getElementById(dropdownId);

      if (menu) {
        const isExpanded = this.getAttribute("aria-expanded") === "true";
        this.setAttribute("aria-expanded", !isExpanded);
        menu.classList.toggle("active");

        // Close other dropdowns
        dropBtns.forEach((otherBtn) => {
          if (otherBtn !== btn) {
            const otherId = otherBtn.getAttribute("data-dropdown");
            const otherMenu = document.getElementById(otherId);
            if (otherMenu) {
              otherMenu.classList.remove("active");
              otherBtn.setAttribute("aria-expanded", "false");
            }
          }
        });
      }
    });
  });

  // Close mobile menu when clicking on nav links (except dropdown buttons)
  const navLinks = document.querySelectorAll(".bt-nav a");
  navLinks.forEach((link) => {
    link.addEventListener("click", function (e) {
      if (window.innerWidth <= 1024) {
        setTimeout(() => {
          closeMobileMenu();
        }, 100);
      }
    });
  });

  // Header scroll effect
  const header = document.querySelector(".bt-header");
  window.addEventListener("scroll", () => {
    if (header) {
      if (window.scrollY > 50) {
        header.classList.add("bt-scrolled");
      } else {
        header.classList.remove("bt-scrolled");
      }
    }
  });

  // Close menu on window resize
  window.addEventListener("resize", function () {
    if (window.innerWidth > 1024) {
      if (mobileMenu && mobileMenu.classList.contains("active")) {
        closeMobileMenu();
      }
    }
  });

  // Close dropdowns when clicking outside (desktop)
  document.addEventListener("click", function (e) {
    if (window.innerWidth > 1024) {
      const isDropdown = e.target.closest(".bt-dropdown");
      if (!isDropdown) {
        document.querySelectorAll(".bt-drop-menu").forEach((menu) => {
          menu.classList.remove("active");
        });
        dropBtns.forEach((btn) => {
          btn.setAttribute("aria-expanded", "false");
        });
      }
    }
  });

  // Initialize ARIA attributes
  dropBtns.forEach((btn) => {
    btn.setAttribute("aria-expanded", "false");
  });
</script>
