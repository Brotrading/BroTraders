<style>
  /* ================= HEADER ================= */

  }

  .bt-container {
    max-width: 1400px;
    margin: auto;
    padding: 0px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;

  }

  .bt-header.bt-scrolled .bt-container {

  }

  .bt-logo img {
    height: 90px;
    transition: height 0.3s ease;
  }

  .bt-header.bt-scrolled .bt-logo img {
    height: 70px;
  }

  /* ================= NAV ================= */

  .bt-nav {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .bt-link,
  .bt-drop-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
  }

  .bt-link:hover,
  .bt-drop-btn:hover {
    color: #00c2ff;
  }

  /* ================= DROPDOWN ================= */

  /* ================= DROPDOWN ================= */

  .bt-dropdown {
    position: relative;
  }

  .bt-drop-menu {
    position: absolute;
    top: 170%;
    left: 0;
    min-width: 650px;
    padding: 30px;
    border-radius: 14px;
    background: rgba(15, 20, 45, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 194, 255, 0.6);

    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.35s ease;

    z-index: 1001;
  }

  .bt-drop-menu.small {
    min-width: 260px;
    padding: 20px;
  }

  .bt-drop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  .bt-drop-menu a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin-bottom: 12px;
    transition: 0.3s;
  }

  .bt-drop-menu a:hover {
    color: #00c2ff;
    padding-left: 5px;
  }
  .bt-drop-menu strong:hover {
    color: #f1f3f4;
    padding-left: 0px !important;
    transition: 0s;
  }

  /* DESKTOP HOVER OPEN */

  @media (min-width: 1025px) {
    .bt-dropdown:hover .bt-drop-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  }
  /* ================= HOVER DROPDOWN (DESKTOP ONLY) ================= */
  @media (min-width: 1025px) {
    .bt-dropdown:hover .bt-drop-menu {
      display: block;
    }
  }

  /* ================= CTA ================= */

  .bt-cta {
    background: linear-gradient(135deg, #00c2ff, #1e90ff);
    padding: 12px 26px;
    border-radius: 30px;
    color: #fff;
    text-decoration: none;

    transition: 0.3s ease;
    /* box-shadow: 0 0 15px rgba(0, 194, 255, 0.5); */
  }

  .bt-cta:hover {
    transform: translateY(-3px);
    background: white;
    color: #0b0f2a;
  }

  /* ================= HAMBURGER ================= */

  .bt-hamburger {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
  }

  .bt-hamburger span {
    width: 26px;
    height: 3px;
    background: #fff;
  }

  /* ================= MOBILE MENU ================= */

  .bt-mobile-close {
    display: none;
    position: absolute;
    top: 25px;
    right: 25px;
    font-size: 26px;
    color: #fff;
    cursor: pointer;
  }

  .bt-overlay {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(2px);
    background: rgba(0, 0, 0, 0.5);
    display: none;
    z-index: 900;
  }

  .bt-overlay.active {
    display: block;
  }

  @media (max-width: 1024px) {
    .bt-nav {
      position: fixed;
      top: 0;
      right: -100%;

      max-width: 420px;
      height: 100vh;
      background: #0b0f2a;
      flex-direction: column;
      align-items: flex-start;
      padding: 100px 25px 40px;
      gap: 20px;
      transition: 0.4s ease;
      z-index: 1002;
      overflow-y: auto;
    }

    .bt-nav.active {
      right: 0;
      top: 15px;
    }

    .bt-hamburger {
      display: flex;
    }

    .bt-cta {
      display: none;
    }

    .bt-mobile-close {
      display: block;
    }

    /* Dropdown styling */
    .bt-drop-menu {
      position: static;
      min-width: 100%;
      padding: 15px 0;
      margin-top: 10px;
      background: transparent;
      border: none;
      background: rgba(15, 20, 45, 0.6);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(0, 194, 255, 0.3);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    /* 2 Column grid */
    .bt-drop-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 25px;
    }

    .bt-drop-menu a {
      font-size: 14px;
      line-height: 1.5;
    }
  }

  /* Extra small mobile → 1 column */
  @media (max-width: 480px) {
    .bt-drop-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>

<script>
  function toggleDropdown(id) {
    const menu = document.getElementById(id);

    // Close ALL dropdowns first
    document.querySelectorAll(".bt-drop-menu").forEach((m) => {
      if (m.id !== id) {
        m.classList.remove("active");
      }
    });

    // Toggle clicked one
    menu.classList.toggle("active");
  }

  function toggleMobileMenu() {
    document.querySelector(".bt-nav").classList.add("active");
    document.querySelector(".bt-overlay").classList.add("active");
  }

  function closeMobileMenu() {
    document.querySelector(".bt-nav").classList.remove("active");
    document.querySelector(".bt-overlay").classList.remove("active");

    document.querySelectorAll(".bt-drop-menu").forEach((m) => {
      m.classList.remove("active");
    });
  }
  const header = document.querySelector(".bt-header");

  window.addEventListener("scroll", () => {
    header.classList.toggle("bt-scrolled", window.scrollY > 50);
  });
  // Close other dropdowns on hover (desktop only)
  if (window.innerWidth > 1024) {
    document.querySelectorAll(".bt-dropdown").forEach((dropdown) => {
      dropdown.addEventListener("mouseenter", function () {
        const activeMenu = document.querySelector(".bt-drop-menu.active");
        if (activeMenu && !this.contains(activeMenu)) {
          activeMenu.classList.remove("active");
        }
      });
    });
  }
</script>
