<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in · BroTrading Rewards</title>
<script src="../head.js"></script>
<link rel="stylesheet" href="./_styles.css" />
</head>
<body class="rw-body">

<div class="rw-auth-shell">
  <div class="rw-auth-card">
    <a href="../index.html"><img src="../bro-trading-logo.jpeg" class="logo" alt="BroTrading" /></a>
    <h1>Log in</h1>
    <p class="sub">Welcome back. Sign in to your Bro Rewards account.</p>

    <button id="googleBtn" class="rw-google-btn" type="button">
      <img src="https://www.google.com/favicon.ico" alt="" />
      Continue with Google
    </button>

    <button id="discordBtn" class="rw-discord-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="white" aria-hidden="true"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
      Continue with Discord
    </button>

    <div class="rw-divider">or with email</div>

    <form id="loginForm" autocomplete="on">
      <label class="rw-label" for="email">Email</label>
      <input class="rw-input" type="email" id="email" name="email" required autocomplete="email" />
      <label class="rw-label" for="password">Password</label>
      <div class="rw-pw-wrap">
        <input class="rw-input" type="password" id="password" name="password" required autocomplete="current-password" />
        <button type="button" class="rw-pw-toggle" id="pwToggle" aria-label="Show password"></button>
      </div>
      <div style="text-align:right; margin-top:6px;">
        <button type="button" id="forgotLink" style="background:none;border:none;padding:0;color:var(--rw-text-2);font-size:12px;cursor:pointer;text-decoration:underline;">Forgot password?</button>
      </div>
      <button class="rw-btn full" type="submit" style="margin-top:16px;">Log in</button>
      <div id="err" class="rw-err"></div>
    </form>

    <div id="forgotSection" style="display:none;">
      <button type="button" id="backToLogin" style="background:none;border:none;padding:0;color:var(--rw-text-2);font-size:13px;cursor:pointer;margin-bottom:16px;">← Back to login</button>
      <h2 style="font-size:18px;margin:0 0 8px;">Reset your password</h2>
      <p style="font-size:14px;color:var(--rw-text-2);margin:0 0 20px;">Enter your email and we'll send you a link to set a new password.</p>
      <label class="rw-label" for="forgotEmail">Email</label>
      <input class="rw-input" type="email" id="forgotEmail" autocomplete="email" />
      <button class="rw-btn full" type="button" id="forgotBtn" style="margin-top:16px;">Send reset link</button>
      <div id="forgotErr" class="rw-err"></div>
      <div id="forgotOk" class="rw-ok"></div>
    </div>

    <p class="switch">
      No account yet? <a href="./signup.html">Create one</a>
    </p>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const err = document.getElementById("err");
  const googleBtn = document.getElementById("googleBtn");

  // Already logged in? bounce to account.
  BroAuth.ready.then(() => {
    if (BroAuth.getSession()) {
      window.location.href = "./account.html";
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    const email = form.email.value.trim();
    const password = form.password.value;
    const { data, error } = await BroAuth.signIn({ email, password });
    if (error) {
      err.textContent = error.message || "Login failed.";
      return;
    }
    window.location.href = "./account.html";
  });

  googleBtn.addEventListener("click", async () => {
    err.textContent = "";
    const { error } = await BroAuth.signInWithGoogle();
    if (error) err.textContent = error.message || "Google sign-in failed.";
  });

  document.getElementById("discordBtn").addEventListener("click", async () => {
    err.textContent = "";
    const { error } = await BroAuth.signInWithDiscord();
    if (error) err.textContent = error.message || "Discord sign-in failed.";
  });

  // Password visibility toggle.
  const EYE_OPEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYE_OFF  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  const pwField  = document.getElementById("password");
  const pwToggle = document.getElementById("pwToggle");
  let pwVisible = false;
  pwToggle.innerHTML = EYE_OPEN;
  pwToggle.addEventListener("click", () => {
    pwVisible = !pwVisible;
    pwField.type = pwVisible ? "text" : "password";
    pwToggle.innerHTML = pwVisible ? EYE_OFF : EYE_OPEN;
    pwToggle.setAttribute("aria-label", pwVisible ? "Hide password" : "Show password");
  });

  // Forgot password flow.
  const loginForm     = document.getElementById("loginForm");
  const forgotSection = document.getElementById("forgotSection");
  document.getElementById("forgotLink").addEventListener("click", () => {
    loginForm.style.display = "none";
    forgotSection.style.display = "block";
  });
  document.getElementById("backToLogin").addEventListener("click", () => {
    forgotSection.style.display = "none";
    loginForm.style.display = "block";
  });
  document.getElementById("forgotBtn").addEventListener("click", async () => {
    const email     = document.getElementById("forgotEmail").value.trim();
    const forgotErr = document.getElementById("forgotErr");
    const forgotOk  = document.getElementById("forgotOk");
    forgotErr.textContent = "";
    forgotOk.textContent  = "";
    if (!email) { forgotErr.textContent = "Please enter your email address."; return; }
    const btn = document.getElementById("forgotBtn");
    btn.disabled = true;
    btn.textContent = "Sending…";
    await BroAuth.ready;
    const { error } = await BroAuth.client.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/rewards/reset-password.html`,
    });
    btn.disabled = false;
    btn.textContent = "Send reset link";
    if (error) {
      forgotErr.textContent = error.message || "Something went wrong. Please try again.";
    } else {
      forgotOk.textContent = "Reset link sent — check your inbox (and spam folder).";
      document.getElementById("forgotEmail").value = "";
    }
  });
</script>

</body>
</html>
