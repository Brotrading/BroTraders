<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

  /* ================================================================
     BT-HEADER  —  canonical CSS injected by header.js
     ================================================================ */

  /* --- Labels (Firm Lists / Top Firms) --- */
  .bt-drop-label { display: block; padding: 6px 0 4px; color: #fff; font-size: 14px; font-weight: 700; cursor: default; pointer-events: none; }

  /* --- Mobile subscribe (hidden on desktop, plain link on mobile) --- */
  .bt-nav-subscribe { display: none; }

  /* ================================================================
     DESKTOP BASE
     ================================================================ */
  .bt-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #080e1c;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    z-index: 1000;
    transition: background 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease;
  }

  .bt-header.bt-scrolled {
    background: rgba(8, 14, 28, 0.90);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom-color: rgba(0, 194, 255, 0.18);
  }

  .bt-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    height: 66px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .bt-logo img { height: 50px; display: block; }

  /* ---- Nav (desktop) ---- */
  .bt-nav { display: flex; gap: 28px; align-items: center; }
  .bt-dropdown { position: relative; }

  /* ---- Nav links ---- */
  .bt-header .bt-link,
  .bt-header .bt-drop-btn {
    font-size: 15px;
    font-family: "Roboto", sans-serif;
    font-weight: 500;
    background: none;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .bt-header .bt-link:hover,
  .bt-header .bt-drop-btn:hover { color: #fff; }

  /* ---- Dropdown menu ---- */
  .bt-drop-menu {
    position: absolute;
    top: 170%;
    left: 0;
    min-width: 650px;
    padding: 30px;
    border-radius: 14px;
    background: rgba(8, 14, 28, 0.97);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 194, 255, 0.25);
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.25s ease;
    z-index: 1001;
  }
  .bt-drop-menu.small { min-width: 220px; padding: 16px 20px; }
  .bt-drop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .bt-drop-menu a { display: block; color: #94a3b8; text-decoration: none; margin-bottom: 12px; font-size: 14px; transition: 0.2s; }
  .bt-drop-menu a:hover { color: #00c2ff; padding-left: 4px; }

  /* Desktop: open on hover */
  @media (min-width: 1281px) {
    .bt-dropdown:hover .bt-drop-menu { opacity: 1; visibility: visible; transform: translateY(0); }
  }

  /* ---- Right-side action group ---- */
  .bt-right-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  /* ---- Auth button (Login / My Account) ---- */
  .bt-auth-btn {
    font-size: 14px;
    font-family: "Roboto", sans-serif;
    font-weight: 500;
    color: #94a3b8;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    padding: 7px 16px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
  }
  .bt-auth-btn:hover { color: #fff; border-color: rgba(255, 255, 255, 0.35); }
  .bt-auth-btn.signed-in { color: #00c2ff; border-color: rgba(0, 194, 255, 0.35); }
  .bt-auth-btn.signed-in:hover { color: #fff; border-color: rgba(0, 194, 255, 0.6); }

  /* ---- Sign up button ---- */
  .bt-signup-btn {
    font-size: 14px;
    font-family: "Roboto", sans-serif;
    font-weight: 500;
    color: #00c2ff;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
    padding: 7px 16px;
    border: 1px solid rgba(0, 194, 255, 0.4);
    border-radius: 8px;
  }
  .bt-signup-btn:hover { color: #fff; border-color: rgba(0, 194, 255, 0.7); background: rgba(0, 194, 255, 0.08); }

  /* ---- CTA button (Subscribe) ---- */
  .bt-cta {
    background: linear-gradient(135deg, #00c2ff, #1e90ff);
    padding: 8px 20px;
    border-radius: 8px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    font-family: "Roboto", sans-serif;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .bt-cta:hover { opacity: 0.88; transform: translateY(-1px); }

  /* ---- Hamburger ---- */
  .bt-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .bt-hamburger span { width: 24px; height: 2px; background: #cbd5e1; display: block; border-radius: 2px; transition: all 0.28s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
  .bt-hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .bt-hamburger.open span:nth-child(2) { opacity: 0; transform: scale(0); }
  .bt-hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ---- Mobile close button — hidden, hamburger-as-X replaces it ---- */
  .bt-mobile-close { display: none !important; }

  /* ================================================================
     TABLET / MOBILE  ≤ 1280 px
     ================================================================ */
  @media (max-width: 1280px) {
    .bt-container { padding: 0 20px; }

    /* Hide desktop action buttons — they appear inside the mobile nav panel */
    .bt-right-actions { display: none; }
    .bt-hamburger { display: flex; }

    /* Slide-out panel */
    .bt-nav {
      position: fixed; top: 0; right: -100%;
      width: 85%; max-width: 380px; height: 100vh;
      background: linear-gradient(135deg, #050a14 0%, #080e1c 100%);
      flex-direction: column; align-items: stretch;
      padding: 80px 25px 40px; gap: 6px;
      transition: 0.35s ease; z-index: 1002;
      overflow-y: auto; box-shadow: -8px 0 32px rgba(0, 0, 0, 0.6);
    }
    .bt-nav.open { right: 0; }
    .bt-nav-subscribe { display: block; }

    .bt-header .bt-link,
    .bt-header .bt-drop-btn {
      font-size: 17px; padding: 11px 0; width: 100%;
      text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      color: #e2e8f0;
    }
    .bt-dropdown { width: 100%; }
    .bt-drop-btn { display: flex; justify-content: space-between; align-items: center; }
    .bt-drop-btn::after { content: "▾"; font-size: 14px; transition: transform 0.25s; color: #64748b; }
    .bt-dropdown.open .bt-drop-btn::after { transform: rotate(180deg); }

    .bt-drop-menu {
      position: static; min-width: 100%; padding: 0; margin-top: 0;
      background: rgba(255,255,255,0.03); backdrop-filter: none;
      border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 10px;
      opacity: 0; visibility: hidden; transform: none;
      transition: opacity 0.25s ease, visibility 0.25s ease, max-height 0.3s ease, padding 0.25s ease;
      max-height: 0; overflow: hidden;
    }
    .bt-dropdown.open .bt-drop-menu { opacity: 1; visibility: visible; padding: 14px; max-height: 500px; margin-top: 8px; }
    .bt-drop-menu.small { min-width: 100%; }
    .bt-drop-grid { grid-template-columns: 1fr 1fr; gap: 12px 20px; }
    .bt-drop-menu a { font-size: 13px; line-height: 1.5; margin-bottom: 8px; padding: 4px 0; }
    .bt-drop-menu strong { font-size: 14px; display: block; margin-bottom: 8px; }
  }

  /* ================================================================
     SMALL MOBILE  ≤ 767 px
     ================================================================ */
  @media (max-width: 767px) {
    .bt-container { padding: 0 16px; }
    .bt-logo img { height: 42px; }
    .bt-nav { width: 88%; max-width: 340px; padding: 72px 20px 30px; }
    .bt-header .bt-link,
    .bt-header .bt-drop-btn { font-size: 16px; padding: 10px 0; }
    .bt-drop-grid { gap: 10px 15px; }
    .bt-drop-menu a { font-size: 13px; margin-bottom: 6px; }
  }

  /* ================================================================
     EXTRA SMALL  ≤ 480 px
     ================================================================ */
  @media (max-width: 480px) {
    .bt-container { padding: 0 14px; }
    .bt-logo img { height: 38px; }
    .bt-nav { width: 100%; max-width: none; padding: 66px 18px 25px; }
    .bt-header .bt-link,
    .bt-header .bt-drop-btn { font-size: 15px; padding: 10px 0; }
  }
</style>

<header class="bt-header">
  <div class="bt-container">

    <div class="bt-logo">
      <a href="/index.html">
        <img src="/Bro_Trading_logo-removebg-preview.png" alt="Bro Trading" />
      </a>
    </div>

    <nav class="bt-nav">
      <button class="bt-mobile-close" aria-label="Close menu">✕</button>

      <div class="bt-dropdown">

        <div class="bt-drop-menu" id="funding">
          <div class="bt-drop-grid">
            <div>
              <strong class="bt-drop-label">Firm Lists :</strong>
              <a href="/CompareTopFirms/comparison.html">Prop Firm Comparison</a>
              <a href="/CompareTopFirms/Drawdown.html">Largest Drawdown</a>

      <a href="/GiveAway.html" class="bt-link">Giveaway</a>

      <!-- Mobile-only links (hidden on desktop via .bt-nav-subscribe) -->
      <a href="/rewards/login.html" class="bt-link bt-nav-subscribe" id="btAuthLinkMobile">Login</a>
      <a href="/rewards/signup.html" class="bt-link bt-nav-subscribe" id="btSignupLinkMobile">Sign up</a>

    <div class="bt-right-actions">

    <button class="bt-hamburger" id="hamburgerBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>
